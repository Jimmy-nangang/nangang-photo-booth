<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>南港段 AI 雲端拍貼機</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(circle at top,#123,#02040c 65%);
  overflow:hidden;
  font-family:"Microsoft JhengHei",sans-serif;
  color:white;
}
.container{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
}
.title{
  position:absolute;top:20px;left:30px;
  font-size:32px;font-weight:bold;color:#5de4ff;
  text-shadow:0 0 20px #00eaff;
}
.subtitle{
  position:absolute;top:70px;left:32px;
  color:#9fdcff;font-size:14px;letter-spacing:2px;
}
.status{
  position:absolute;right:30px;top:25px;
  text-align:right;color:#8edfff;font-size:14px;line-height:1.8;
}
.stage{
  display:flex;gap:24px;align-items:flex-start;
}
.camera-wrapper{
  position:relative;width:960px;height:540px;
  border-radius:24px;overflow:hidden;
  border:4px solid rgba(0,255,255,.45);
  box-shadow:0 0 30px rgba(0,255,255,.35), inset 0 0 30px rgba(0,255,255,.12);
}
video{
  width:100%;height:100%;object-fit:cover;
  transform:scaleX(-1);
}
.overlay{position:absolute;inset:0;pointer-events:none}
.scan-line{
  position:absolute;width:100%;height:4px;
  background:rgba(0,255,255,.8);
  box-shadow:0 0 20px cyan;
  animation:scan 3s linear infinite;
}
@keyframes scan{0%{top:0}100%{top:100%}}
.countdown{
  position:absolute;font-size:170px;font-weight:bold;
  color:white;text-shadow:0 0 25px cyan,0 0 50px cyan;
  display:none;z-index:5;
}
.panel{
  width:280px;padding:18px;
  border:1px solid rgba(93,228,255,.35);
  border-radius:22px;
  background:rgba(4,14,35,.72);
  box-shadow:0 0 25px rgba(0,255,255,.18);
}
.panel h3{
  color:#5de4ff;margin-bottom:14px;font-size:20px;
}
.bg-btn{
  width:100%;margin-bottom:12px;padding:14px 12px;
  border:none;border-radius:14px;
  background:rgba(255,255,255,.08);
  color:white;font-size:17px;font-weight:bold;
  cursor:pointer;border:1px solid rgba(255,255,255,.18);
}
.bg-btn.active{
  background:linear-gradient(135deg,#00d2ff,#7c4dff);
  box-shadow:0 0 18px rgba(93,228,255,.55);
}
.controls{
  margin-top:22px;display:flex;gap:18px;
}
button.action{
  padding:15px 34px;border:none;border-radius:15px;
  background:linear-gradient(135deg,#00d2ff,#3a7bd5);
  color:white;font-size:21px;cursor:pointer;font-weight:bold;
  box-shadow:0 0 20px rgba(0,255,255,.38);
}
button.action:hover{transform:scale(1.04)}
#preview{
  margin-top:16px;max-width:360px;border-radius:18px;
  border:3px solid cyan;display:none;
}
.footer{
  position:absolute;bottom:14px;color:#6aa8d8;
  font-size:13px;letter-spacing:2px;
}
.hint{
  margin-top:10px;color:#a8dfff;font-size:13px;line-height:1.6;
}
</style>
</head>

<body>
<div class="container">
  <div class="title">南港段 AI 雲端拍貼機</div>
  <div class="subtitle">NANGANG METRO SMART PHOTO BOOTH SYSTEM</div>

  <div class="status" id="status">
    系統狀態：ONLINE<br>
    攝影機狀態：啟動中<br>
    背景模板：科技藍
  </div>

  <div class="stage">
    <div class="camera-wrapper">
      <video id="camera" autoplay playsinline></video>
      <div class="overlay"><div class="scan-line"></div></div>
    </div>

    <div class="panel">
      <h3>背景模板</h3>
      <button class="bg-btn active" onclick="selectBg(0)">01 科技藍</button>
      <button class="bg-btn" onclick="selectBg(1)">02 南港夜景</button>
      <button class="bg-btn" onclick="selectBg(2)">03 活動紀念</button>
      <div class="hint">
        目前為內建背景版。<br>
        下一階段會改成從 Google Sheet 讀背景清單。
      </div>
    </div>
  </div>

  <div class="countdown" id="countdown">3</div>

  <div class="controls">
    <button class="action" onclick="startCapture()">📸 開始拍照</button>
    <button class="action" onclick="downloadPhoto()">⬇ 下載 PNG</button>
  </div>

  <canvas id="canvas" width="1280" height="720" style="display:none;"></canvas>
  <img id="preview"/>

  <div class="footer">Taipei Metro Nangang Section © 2026</div>
</div>

<script>
const video = document.getElementById("camera");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");
const countdown = document.getElementById("countdown");
const statusBox = document.getElementById("status");

let latestImage = null;
let currentBg = 0;

const bgNames = ["科技藍", "南港夜景", "活動紀念"];

async function initCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{width:1280,height:720},
      audio:false
    });
    video.srcObject = stream;
    updateStatus("攝影機狀態：已啟動");
  }catch(err){
    alert("無法啟動攝影機：" + err);
    updateStatus("攝影機狀態：啟動失敗");
  }
}

function selectBg(index){
  currentBg = index;
  document.querySelectorAll(".bg-btn").forEach((b,i)=>{
    b.classList.toggle("active", i === index);
  });
  updateStatus("攝影機狀態：已啟動");
}

function updateStatus(cameraText){
  statusBox.innerHTML =
    "系統狀態：ONLINE<br>" +
    cameraText + "<br>" +
    "背景模板：" + bgNames[currentBg];
}

async function startCapture(){
  countdown.style.display = "block";
  for(let i=3;i>=1;i--){
    countdown.innerText = i;
    await wait(1000);
  }
  countdown.style.display = "none";
  capturePhoto();
}

function capturePhoto(){
  drawTemplateBackground();

  const photoX = 105;
  const photoY = 75;
  const photoW = 710;
  const photoH = 570;

  ctx.save();
  ctx.beginPath();
  roundRect(ctx, photoX, photoY, photoW, photoH, 34);
  ctx.clip();

  ctx.translate(photoX + photoW, photoY);
  ctx.scale(-1,1);
  ctx.drawImage(video, 0, 0, photoW, photoH);
  ctx.restore();

  drawFrame(photoX, photoY, photoW, photoH);
  drawTextBlock();

  latestImage = canvas.toDataURL("image/png");
  preview.src = latestImage;
  preview.style.display = "block";
}

function drawTemplateBackground(){
  ctx.clearRect(0,0,1280,720);

  if(currentBg === 0){
    const g = ctx.createLinearGradient(0,0,1280,720);
    g.addColorStop(0,"#051937");
    g.addColorStop(.5,"#003b6f");
    g.addColorStop(1,"#16113a");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,1280,720);

    drawGrid("#36e6ff");
    drawGlowCircle(1060,150,160,"rgba(0,255,255,.28)");
    drawGlowCircle(1110,560,220,"rgba(124,77,255,.25)");
  }

  if(currentBg === 1){
    const g = ctx.createLinearGradient(0,0,0,720);
    g.addColorStop(0,"#020617");
    g.addColorStop(.55,"#123456");
    g.addColorStop(1,"#08111f");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,1280,720);

    for(let i=0;i<36;i++){
      const x=i*42;
      const h=120+Math.random()*230;
      ctx.fillStyle="rgba(120,220,255,.22)";
      ctx.fillRect(x,720-h,28,h);
      ctx.fillStyle="rgba(255,255,255,.55)";
      ctx.fillRect(x+8,720-h+20,4,4);
      ctx.fillRect(x+17,720-h+55,4,4);
    }
    drawGlowCircle(1000,220,220,"rgba(0,180,255,.25)");
  }

  if(currentBg === 2){
    const g = ctx.createRadialGradient(640,360,80,640,360,760);
    g.addColorStop(0,"#552b88");
    g.addColorStop(.45,"#111f5c");
    g.addColorStop(1,"#020617");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,1280,720);

    drawGlowCircle(1080,170,180,"rgba(255,214,102,.28)");
    drawGlowCircle(1030,570,230,"rgba(0,255,255,.20)");
    drawGrid("#ffffff");
  }
}

function drawGrid(color){
  ctx.save();
  ctx.strokeStyle = color;
  ctx.globalAlpha = .13;
  ctx.lineWidth = 1;
  for(let x=0;x<1280;x+=40){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,720);ctx.stroke();
  }
  for(let y=0;y<720;y+=40){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(1280,y);ctx.stroke();
  }
  ctx.restore();
}

function drawGlowCircle(x,y,r,color){
  const g = ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,color);
  g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
}

function drawFrame(x,y,w,h){
  ctx.save();
  ctx.lineWidth = 10;
  ctx.strokeStyle = "rgba(255,255,255,.9)";
  roundRect(ctx,x,y,w,h,34);
  ctx.stroke();

  ctx.lineWidth = 4;
  ctx.strokeStyle = "rgba(0,255,255,.95)";
  roundRect(ctx,x+12,y+12,w-24,h-24,24);
  ctx.stroke();
  ctx.restore();
}

function drawTextBlock(){
  ctx.save();

  ctx.fillStyle = "rgba(0,0,0,.34)";
  roundRect(ctx,850,75,345,570,32);
  ctx.fill();

  ctx.fillStyle = "#5de4ff";
  ctx.font = "bold 40px Microsoft JhengHei";
  ctx.fillText("南港段",900,150);

  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 34px Microsoft JhengHei";
  ctx.fillText("雲端拍貼機",900,205);

  ctx.strokeStyle = "rgba(93,228,255,.75)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(900,235);
  ctx.lineTo(1145,235);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,.9)";
  ctx.font = "24px Microsoft JhengHei";
  ctx.fillText("NANGANG",900,300);
  ctx.fillText("PHOTO BOOTH",900,335);

  ctx.fillStyle = "#ffd166";
  ctx.font = "bold 26px Microsoft JhengHei";
  ctx.fillText(bgNames[currentBg],900,410);

  ctx.fillStyle = "rgba(255,255,255,.72)";
  ctx.font = "20px Microsoft JhengHei";
  ctx.fillText(getTodayText(),900,505);
  ctx.fillText("TAIPEI METRO",900,545);

  ctx.restore();
}

function getTodayText(){
  const d = new Date();
  return d.getFullYear() + "." +
    String(d.getMonth()+1).padStart(2,"0") + "." +
    String(d.getDate()).padStart(2,"0");
}

function downloadPhoto(){
  if(!latestImage){
    alert("尚未拍照");
    return;
  }

  const a = document.createElement("a");
  a.href = latestImage;
  a.download = "nangang-photo-booth.png";
  a.click();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wait(ms){
  return new Promise(resolve=>setTimeout(resolve,ms));
}

initCamera();
</script>
</body>
</html>
